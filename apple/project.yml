# XcodeGen spec — generates Distavo.xcodeproj (committable, diff-able).
# Regenerate after editing:  cd apple && xcodegen generate
name: Distavo
options:
  bundleIdPrefix: uk.co.riera
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
# One edition per target, sharing the DistavoApp template. Sparkle is linked ONLY
# into the Direct target — the App Store forbids third-party updaters and Setapp
# ships its own, so those builds must not embed Sparkle. (Direct and Setapp used
# to share one target differentiated by a command-line xcconfig, which cannot
# link a dependency for only one of them — hence the split.)
#
# The three project configs are kept so the existing release workflows are
# unchanged: release.yml builds `-scheme Distavo -configuration Release`, and
# release-appstore.yml archives `-scheme Distavo-AppStore` at config
# Release-AppStore. Each target maps every config to its own edition xcconfig.
configs:
  Debug: debug
  Release: release
  Release-AppStore: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.7.0"
    CURRENT_PROJECT_VERSION: "8"
    # Left empty on purpose: CI (release*.yml) and scripts/build-and-notarize.sh
    # inject the real Team ID via `DEVELOPMENT_TEAM=<id>` on the xcodebuild line.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
packages:
  DistavoCore:
    path: DistavoCore
  DistavoEmbedded:
    path: DistavoEmbedded
  # Direct-edition auto-update. Only the Distavo (Direct) target depends on it.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.4"
targetTemplates:
  DistavoApp:
    type: application
    platform: macOS
    dependencies:
      - package: DistavoCore
      - package: DistavoEmbedded
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        # Every edition ships as "Distavo.app" even though the targets differ
        # (Distavo-AppStore / Distavo-Setapp) — otherwise the product would be
        # named after the target and break the release pipelines.
        PRODUCT_NAME: Distavo
        GENERATE_INFOPLIST_FILE: YES
        # Merged into the generated plist — holds NSAudioCaptureUsageDescription,
        # which has no INFOPLIST_KEY_* equivalent.
        INFOPLIST_FILE: Distavo-Extra-Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_CFBundleDisplayName: Distavo
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Joan Marc Riera Duocastella · MIT"
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "Distavo opens Terminal to run the optional install commands you choose."
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Distavo connects to the WhisperX and Ollama servers you run on your local network to transcribe and summarise recordings."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Distavo records your voice through the microphone when you choose Record meeting. Recordings stay on this Mac."
targets:
  # ── Direct edition (GitHub / notarized DMG) — the only target with Sparkle ──
  Distavo:
    templates: [DistavoApp]
    configFiles:
      Debug: configs/Direct.xcconfig
      Release: configs/Direct.xcconfig
      Release-AppStore: configs/Direct.xcconfig
    dependencies:
      - package: Sparkle
    settings:
      base:
        # Direct-only plist: adds SUFeedURL / SUPublicEDKey (Sparkle keys have no
        # INFOPLIST_KEY_* equivalent) on top of the shared audio/encryption keys.
        INFOPLIST_FILE: Distavo-Direct-Info.plist
  # ── Mac App Store edition (sandboxed) — no Sparkle ──
  Distavo-AppStore:
    templates: [DistavoApp]
    configFiles:
      Debug: configs/AppStore.xcconfig
      Release: configs/AppStore.xcconfig
      Release-AppStore: configs/AppStore.xcconfig
  # ── Setapp edition — no Sparkle (Setapp ships its own updater) ──
  Distavo-Setapp:
    templates: [DistavoApp]
    configFiles:
      Debug: configs/Setapp.xcconfig
      Release: configs/Setapp.xcconfig
      Release-AppStore: configs/Setapp.xcconfig
    settings:
      base:
        # Setapp requires a hand-authored Info.plist (NSUpdateSecurityPolicy etc.).
        # Set at target level so it overrides the template's generated plist.
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Setapp-Info.plist
        ASSETCATALOG_COMPILER_STANDALONE_ICON_BEHAVIOR: All
schemes:
  # Direct: release.yml builds `-scheme Distavo -configuration Release`.
  Distavo:
    build:
      targets:
        Distavo: all
    run:
      config: Debug
  # App Store: release-appstore.yml archives `-scheme Distavo-AppStore` (no
  # -configuration → the archive action's config below = Release-AppStore).
  Distavo-AppStore:
    build:
      targets:
        Distavo-AppStore: all
    run:
      config: Release-AppStore
    archive:
      config: Release-AppStore
  # Setapp: manual build — `xcodebuild -scheme Distavo-Setapp -configuration Release`.
  Distavo-Setapp:
    build:
      targets:
        Distavo-Setapp: all
    run:
      config: Release
